name: Continuous Integration (CI)

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Run Linter
        run: npm run lint

      - name: Run Vitest Unit Tests
        run: npx vitest run

      - name: Build Next.js Application
        env:
          NEXT_PUBLIC_SUPABASE_URL: https://wspkybcgcxkxvgkcibro.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: sb_publishable_placeholder
          GEMINI_API_KEY: ai_placeholder
        run: npm run build
